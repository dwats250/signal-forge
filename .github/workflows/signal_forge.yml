name: Signal Forge V2

on:
  schedule:
    # Premarket: 06:00 PT / 13:00 UTC Mon–Fri
    - cron: '0 13 * * 1-5'
    # Intraday monitor: every 30 min, 14:00–21:00 UTC Mon–Fri (07:00–14:00 PT)
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (premarket or intraday)'
        required: false
        default: 'premarket'
        type: choice
        options:
          - premarket
          - intraday

# Prevent concurrent runs from stepping on each other's git push
concurrency:
  group: signal-forge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required for git push

jobs:
  # ── Premarket: full pipeline ────────────────────────────────────────────
  premarket:
    name: Premarket Pipeline
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 13 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'premarket') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == '')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run premarket pipeline
        env:
          POLYGON_API_KEY:    ${{ secrets.POLYGON_API_KEY }}
          PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: python -m signal_forge.run_premarket

      - name: Commit and push report
        run: |
          git config user.name  "signal-forge-ci[bot]"
          git config user.email "signal-forge-ci[bot]@users.noreply.github.com"

          # Stage report and audit artifacts
          git add reports/ logs/ || true

          # Read commit message written by run_premarket; fall back gracefully
          COMMIT_MSG=$(cat .sf_commit_msg 2>/dev/null || echo "SF report: $(date +%Y-%m-%d) | pipeline run")

          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "$COMMIT_MSG"
            git push
          fi

  # ── Intraday: regime monitor ────────────────────────────────────────────
  intraday:
    name: Intraday Monitor
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '*/30 14-21 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'intraday')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run intraday monitor
        env:
          POLYGON_API_KEY:    ${{ secrets.POLYGON_API_KEY }}
          PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: python -m signal_forge.run_intraday

      - name: Commit state and audit updates
        run: |
          git config user.name  "signal-forge-ci[bot]"
          git config user.email "signal-forge-ci[bot]@users.noreply.github.com"

          git add logs/ || true

          if git diff --staged --quiet; then
            echo "No state changes."
          else
            DATE=$(date -u +%Y-%m-%dT%H:%M)
            git commit -m "SF intraday: ${DATE} UTC | state update"
            git push
          fi
